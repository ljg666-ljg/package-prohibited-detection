<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0a0e27"/>
      <stop offset="100%" style="stop-color:#1a1f4e"/>
    </linearGradient>
    <linearGradient id="scan" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#00d4ff;stop-opacity:0.8"/>
      <stop offset="100%" style="stop-color:#a855f7;stop-opacity:0.8"/>
    </linearGradient>
  </defs>

  <!-- 背景 -->
  <rect width="200" height="200" rx="40" fill="url(#bg)"/>
  <rect width="200" height="200" rx="40" fill="none" stroke="#00d4ff" stroke-width="2" opacity="0.4"/>

  <!-- 扫描线效果 -->
  <line x1="0" y1="30" x2="200" y2="30" stroke="#00d4ff" stroke-width="0.5" opacity="0.15"/>
  <line x1="0" y1="60" x2="200" y2="60" stroke="#00d4ff" stroke-width="0.5" opacity="0.15"/>
  <line x1="0" y1="90" x2="200" y2="90" stroke="#00d4ff" stroke-width="0.5" opacity="0.15"/>
  <line x1="0" y1="120" x2="200" y2="120" stroke="#00d4ff" stroke-width="0.5" opacity="0.15"/>
  <line x1="0" y1="150" x2="200" y2="150" stroke="#00d4ff" stroke-width="0.5" opacity="0.15"/>
  <line x1="0" y1="180" x2="200" y2="180" stroke="#00d4ff" stroke-width="0.5" opacity="0.15"/>

  <!-- 核心图标：包裹 + 检测 -->
  <!-- 包裹盒子 -->
  <rect x="55" y="70" width="90" height="70" rx="8" fill="none" stroke="url(#scan)" stroke-width="4"/>
  <!-- 盒子胶带 -->
  <line x1="100" y1="70" x2="100" y2="140" stroke="url(#scan)" stroke-width="3"/>
  <!-- 盒子横带 -->
  <line x1="55" y1="105" x2="145" y2="105" stroke="url(#scan)" stroke-width="3"/>

  <!-- 扫描/检测标识 - 放大镜 -->
  <circle cx="160" cy="55" r="18" fill="none" stroke="#a855f7" stroke-width="3.5"/>
  <line x1="173" y1="68" x2="188" y2="83" stroke="#a855f7" stroke-width="3.5" stroke-linecap="round"/>

  <!-- 左上角：AI / 神经网络节点 -->
  <circle cx="40" cy="40" r="4" fill="#00d4ff" opacity="0.8"/>
  <circle cx="55" cy="35" r="3" fill="#a855f7" opacity="0.6"/>
  <circle cx="35" cy="55" r="3" fill="#00d4ff" opacity="0.6"/>
  <line x1="40" y1="40" x2="55" y2="35" stroke="#00d4ff" stroke-width="0.8" opacity="0.4"/>
  <line x1="40" y1="40" x2="35" y2="55" stroke="#00d4ff" stroke-width="0.8" opacity="0.4"/>

  <!-- 文字 -->
  <text x="100" y="185" text-anchor="middle" font-family="Arial,sans-serif" font-size="11" fill="#00d4ff" font-weight="bold" opacity="0.7" letter-spacing="2">PPD · AI</text>
</svg>
