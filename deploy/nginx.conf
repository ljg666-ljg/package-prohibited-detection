# Nginx 配置文件
# 放在服务器的 /etc/nginx/sites-available/ppd_detection

upstream ppd_backend {
    server 127.0.0.1:8000;
}

# HTTP 服务（无 HTTPS）
server {
    listen 80;
    server_name YOUR_SERVER_IP;  # 替换为你的服务器公网 IP

    client_max_body_size 500M;  # 允许上传大视频文件
    client_body_timeout 300s;   # 上传超时

    # 静态文件
    location /static/ {
        alias /opt/ppd_detection/staticfiles/;
        expires 30d;
        add_header Cache-Control "public, immutable";
    }

    # 媒体文件（上传图片/视频/结果）
    location /media/ {
        alias /opt/ppd_detection/media/;
        expires 7d;
    }

    # 代理到 Gunicorn
    location / {
        proxy_pass http://ppd_backend;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 300s;
        proxy_connect_timeout 75s;
    }

    # WebSocket 代理（摄像头实时检测）
    location /ws/ {
        proxy_pass http://ppd_backend;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_read_timeout 86400s;
    }
}
