{% extends 'base.html' %}
{% load static %}
{% block title %}登录 - 包裹违禁物品检测识别系统{% endblock %}
{% block content %}
<div class="auth-container">
    <div class="auth-card">
        <div class="auth-header">
            <i class="bi bi-shield-lock"></i>
            <h2>系统登录</h2>
            <p class="text-muted">包裹违禁物品智能检测平台</p>
        </div>
        <form method="post" action="{% url 'accounts:login' %}">
            {% csrf_token %}
            {% if form.errors %}
            <div class="alert alert-danger">
                <i class="bi bi-exclamation-triangle"></i> 用户名或密码错误，请重试。
            </div>
            {% endif %}
            <div class="mb-3">
                <label for="username" class="form-label">
                    <i class="bi bi-person"></i> 用户名
                </label>
                <input type="text" name="username" id="username" class="form-control" required autofocus>
            </div>
            <div class="mb-3">
                <label for="password" class="form-label">
                    <i class="bi bi-key"></i> 密码
                </label>
                <input type="password" name="password" id="password" class="form-control" required>
            </div>
            <button type="submit" class="btn btn-primary w-100">
                <i class="bi bi-box-arrow-in-right"></i> 登录
            </button>
        </form>
        <div class="auth-footer">
            <p>还没有账号？<a href="{% url 'accounts:register' %}">立即注册</a></p>
        </div>
    </div>
</div>
{% endblock %}
